version: "1"
services:
  - type: web
    name: ai-document-assistant
    env: python
    builder: pip
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python render_app.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_API_KEY
        sync: false
